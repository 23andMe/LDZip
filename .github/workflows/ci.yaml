name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ (make build/test)
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: cpp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make \
            jq \
            bc

      - name: Setup conda (miniforge + mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          auto-update-conda: true
          use-mamba: true
          activate-environment: plink-env

      # Important: conda activation doesn't persist unless we use a login shell
      - name: Install plink2
        shell: bash -l {0}
        run: |
          set -euo pipefail
          mamba install -y -c conda-forge -c bioconda plink2
          which plink2
          plink2 --version
          echo "PLINK2=$(which plink2)" >> "$GITHUB_ENV"

      - name: Build
        run: make build

      - name: Test
        env:
          PLINK2: ${{ env.PLINK2 }}
        run: make test