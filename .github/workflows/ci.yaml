name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ (make build/test)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: cpp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make

      - name: Build
        run: make build

      - name: Test
        run: make test